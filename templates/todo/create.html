{% extends "todo/base.html" %}
{% load static %}
{% block content %}
<div class="container">
  <h2>Create a New Todo</h2>
  <div>
    <label for="image">Image:</label>
    <input type="file" id="image">
  </div>
  <div>
    <label for="name">Name:</label>
    <input type="text" name="name" id="name">
  </div>
  <div>
    <label for="description">Description:</label>
    <textarea name="description" id="description"></textarea>
  </div>
  <div>
    <label for="complete">Complete:</label>
    <input type="checkbox" name="complete" id="complete">
  </div>
  <div>
    <label for="exp">Experience Points:</label>
    <input type="number" name="exp" id="exp" min="0">
  </div>
  <button type="submit" id="todoCreate">Create</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>

const api = axios.create({
  baseURL: "/",
  // Content-Type을 직접 지정하지 않음
  // → 브라우저가 FormData를 보낼 때 자동으로 multipart/form-data로 설정해줌
});

// Axios 인터셉터: 모든 요청이 서버로 가기 전에 실행
api.interceptors.request.use(config => {
  // 쿠키에서 csrftoken을 읽어서 헤더에 자동으로 추가
  const csrftoken = document.cookie
    .split("; ")
    .find(row => row.startsWith("csrftoken="))
    ?.split("=")[1];

  if (csrftoken) {
    config.headers["X-CSRFToken"] = csrftoken;
  }
  return config;
});

document.getElementById("todoCreate").addEventListener("click", async () => {
  try {
    // FormData: 파일 포함 데이터를 서버로 전송할 때 사용
    const formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("complete", document.getElementById("complete").checked);
    formData.append("exp", document.getElementById("exp").value || 0);

    // 이미지가 선택된 경우에만 추가
    const fileInput = document.getElementById("image");
    if (fileInput.files.length > 0) {
      formData.append("image", fileInput.files[0]);
    }

    const res = await api.post("todo/viewsets/view/", formData);
    console.log(res.data);
    window.location.href = "/todo/list/";

  } catch (err) {
    console.error(err.response?.data || err.message);
  }
});
</script>
{% endblock %}
